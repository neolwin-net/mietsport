<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Football Scores</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script>
    const password = prompt("Enter admin password:");
    if (password !== "admin123") {
      alert("Access denied!");
      window.location.href = "index.html";
    }
  </script>

  <header class="site-header">
    <h1>⚙️ Admin Panel</h1>
    <p>Add, edit, delete and export football scores</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="admin-form-section">
      <h2>Add / Update Match</h2>
      <form id="matchForm" class="admin-form">
        <input type="hidden" id="matchId" />

        <input type="text" id="league" placeholder="League" required />
        <input type="date" id="date" required />
        <input type="time" id="time" required />
        <input type="text" id="homeTeam" placeholder="Home Team" required />
        <input type="text" id="awayTeam" placeholder="Away Team" required />
        <input type="number" id="homeScore" placeholder="Home Score" required />
        <input type="number" id="awayScore" placeholder="Away Score" required />

        <select id="status" required>
          <option value="Upcoming">Upcoming</option>
          <option value="Live">Live</option>
          <option value="FT">FT</option>
        </select>

        <button type="submit">Save Match</button>
      </form>
    </section>

    <section class="admin-actions">
      <button id="exportBtn">Export JSON File</button>
    </section>

    <section>
      <h2>Current Matches</h2>
      <div id="adminMatches" class="scores-grid"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
<script type="module" src="app.js"></script>
<section id="scoresContainer" class="scores-grid"></section>
</main>
<script type="module" src="app.js"></script>
</body>
</html>
