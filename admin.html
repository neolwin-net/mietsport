<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Football Scores</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>⚙️ Admin Panel</h1>
    <p>Manage Matches</p>
  </header>

  <main class="container">
    <section class="section-box">
      <h2 class="section-title">Add / Edit Match</h2>

      <form id="matchForm" class="match-form">
        <input type="hidden" id="matchId" />

        <input type="text" id="league" placeholder="League (e.g. Premier League)" required />
        <input type="text" id="homeTeam" placeholder="Home Team" required />
        <input type="text" id="awayTeam" placeholder="Away Team" required />

        <input type="date" id="matchDate" required />
        <input type="time" id="matchTime" required />

        <input type="number" id="homeScore" placeholder="Home Score (leave blank if upcoming)" />
        <input type="number" id="awayScore" placeholder="Away Score (leave blank if upcoming)" />

        <select id="status" required>
          <option value="upcoming">Upcoming</option>
          <option value="previous">Previous</option>
        </select>

        <input type="number" id="order" placeholder="Display Order (1,2,3...)" required />

        <button type="submit" class="btn">Save Match</button>
        <button type="button" id="cancelEdit" class="btn cancel-btn">Cancel Edit</button>
      </form>
    </section>

    <section class="section-box">
      <h2 class="section-title">All Matches</h2>
      <div id="adminMatches"></div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
